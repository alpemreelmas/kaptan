name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build kaptan
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -o dist/kaptan-${{ matrix.goos }}-${{ matrix.goarch }} ./cli

      - name: Build reis
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -o dist/reis-${{ matrix.goos }}-${{ matrix.goarch }} ./agent

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/kaptan-${{ matrix.goos }}-${{ matrix.goarch }}
            dist/reis-${{ matrix.goos }}-${{ matrix.goarch }}
